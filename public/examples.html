<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DFrame Examples</title>
    <style>
        html, body, #root {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            font-family: Arial, sans-serif;
        }
        
        #root {
            display: block;
            background-color: white;
            padding: 20px;
        }
        
        /* Hide any debug-related UI */
        .dframe-debug-panel,
        [data-debug-panel="true"],
        [data-debug="true"] {
            display: none !important;
        }
    </style>
</head>
<body>
    <div id="root"></div>
    <!-- Use examples-bundle.js for the showcase instead of regular bundle.js -->
    <script src="examples-bundle.js"></script>
</body>
</html>
